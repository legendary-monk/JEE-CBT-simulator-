<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Deep slate-blue background -->
  <rect width="512" height="512" rx="112" fill="#1e293b" />
  
  <!-- Subtle technical grid lines -->
  <line x1="64" y1="0" x2="64" y2="512" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />
  <line x1="128" y1="0" x2="128" y2="512" stroke="#334155" stroke-width="1" />
  <line x1="192" y1="0" x2="192" y2="512" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />
  <line x1="256" y1="0" x2="256" y2="512" stroke="#475569" stroke-width="2" />
  <line x1="320" y1="0" x2="320" y2="512" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />
  <line x1="384" y1="0" x2="384" y2="512" stroke="#334155" stroke-width="1" />
  <line x1="448" y1="0" x2="448" y2="512" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />

  <line x1="0" y1="64" x2="512" y2="64" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />
  <line x1="0" y1="128" x2="512" y2="128" stroke="#334155" stroke-width="1" />
  <line x1="0" y1="192" x2="512" y2="192" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />
  <line x1="0" y1="256" x2="512" y2="256" stroke="#475569" stroke-width="2" />
  <line x1="0" y1="320" x2="512" y2="320" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />
  <line x1="0" y1="384" x2="512" y2="384" stroke="#334155" stroke-width="1" />
  <line x1="0" y1="448" x2="512" y2="448" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,8" />

  <!-- Blueprint corner drafting brackets -->
  <path d="M 40 80 L 40 40 L 80 40" fill="none" stroke="#64748b" stroke-width="3" />
  <path d="M 472 80 L 472 40 L 432 40" fill="none" stroke="#64748b" stroke-width="3" />
  <path d="M 40 432 L 40 472 L 80 472" fill="none" stroke="#64748b" stroke-width="3" />
  <path d="M 472 432 L 472 472 L 432 472" fill="none" stroke="#64748b" stroke-width="3" />

  <!-- Concentric engineering circles -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,6" />
  <circle cx="256" cy="256" r="130" fill="none" stroke="#f59e0b" stroke-width="3" />
  <circle cx="256" cy="256" r="80" fill="none" stroke="#38bdf8" stroke-width="2" />
  <circle cx="256" cy="256" r="30" fill="none" stroke="#10b981" stroke-width="2" />

  <!-- Drafting compass/ruler lines -->
  <line x1="256" y1="96" x2="256" y2="416" stroke="#38bdf8" stroke-width="1.5" />
  <line x1="96" y1="256" x2="416" y2="256" stroke="#38bdf8" stroke-width="1.5" />
  <line x1="142" y1="142" x2="370" y2="370" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Glowing mathematical symbol accents -->
  <!-- Integral sign -->
  <path d="M 120 210 C 130 190, 140 190, 140 210 L 140 300 C 140 320, 150 320, 160 300" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
  <!-- Sigma symbol -->
  <path d="M 350 190 L 390 190 L 370 215 L 390 240 L 350 240" fill="none" stroke="#10b981" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" />
  <!-- Pi sign -->
  <path d="M 120 350 L 160 350 M 130 350 L 130 380 M 150 350 L 150 380" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
  <!-- Infinity symbol -->
  <path d="M 345 365 C 335 355, 335 375, 355 365 C 375 355, 375 375, 365 365" fill="none" stroke="#38bdf8" stroke-width="4" />
</svg>
